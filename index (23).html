// ─── FIREBASE ────────────────────────────────────────────────
function dbSet(path,val){return db.ref(path).set(val);}
function dbPush(path,val){return db.ref(path).push(val);}
function dbListen(path,cb){const ref=db.ref(path);ref.on("value",s=>cb(s.val()));return()=>ref.off();}

function loadData(){
  dbListen("users",d=>{if(d)DATA.users={...d};});
  dbListen("adminpw",d=>{if(d&&d.main)ADMIN_PW={main:d.main,backup:d.backup||"Vara1234"};});
  dbListen("plates",d=>{if(d)DATA.plates=Array.isArray(d)?d.filter(Boolean):Object.values(d).filter(Boolean);safeRender();});
  dbListen("statuses",d=>{if(d)DATA.statuses={...d};safeRender();});
  dbListen("feedbacks",d=>{if(d)DATA.feedbacks={...d};safeRender();});
  dbListen("links",d=>{if(d)DATA.links={...d};else DATA.links={};safeRender();});
}

function safeRender(){if(!ME&&!IS_CUST)return;render();}

function listenConv(plate){
  // Kuuntelee sekä sisäistä että asiakasketjua
  ["int","cust"].forEach(ch=>{
    const key=plate+":"+ch;
    if(convListeners[key])return;
    const msgs={};
    db.ref("convs/"+plate+"/"+ch).on("child_added",snap=>{
      const m=snap.val();if(!m)return;
      if(!msgs[snap.key]){
        msgs[snap.key]=m;
        CONVS[key]=Object.values(msgs).sort((a,b)=>a.id-b.id);
        // Ilmoitukset
        const prev=lastCnt[key]||0;
        if(CONVS[key].length>prev&&prev>0&&m.type!=="system"){
          const role=IS_CUST?"asiakas":ME?.role;
          const shouldNotify=IS_CUST?(ch==="cust"):(ch==="int");
          if(shouldNotify&&Notification.permission==="granted"){
            new Notification("AutoChat — "+plate,{body:(m.name||"")+": "+(m.type==="text"?m.text:"📷"),tag:"ac-"+ch}).onclick=()=>window.focus();
          }
        }
        lastCnt[key]=CONVS[key].length;
        renderMsgs();
      }
    });
    convListeners[key]=true;
  });
}

function sendMsg(plate,ch,msg){
  return dbPush("convs/"+plate+"/"+ch, msg);
}

function doAdd(){

function openPlate(p){

function copyLink(p){
  const base=location.href.split("?")[0];
  const ph=ME?.phone?"&phone="+encodeURIComponent(ME.phone):"";
  const link=base+"?plate="+encodeURIComponent(p)+"&role=asiakas"+ph;

}

  fi.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{pendImg=ev.target.result;chatTab=ch;render();};r.readAsDataURL(f);};

  return wrap;

async function startRec(e){
  if(recActive)return;
  try{const s=await navigator.mediaDevices.getUserMedia({audio:true});chunks=[];mr=new MediaRecorder(s);mr.ondataavailable=ev=>chunks.push(ev.data);mr.onstop=()=>{pendAudio=URL.createObjectURL(new Blob(chunks,{type:"audio/webm"}));s.getTracks().forEach(t=>t.stop());render();};mr.start();recActive=true;render();}

}
